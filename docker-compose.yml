services:

  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: pgvector

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_application_db

    ports:
      - "5433:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

    volumes:
      - pgdata:/var/lib/postgresql

  app:
    image: limadevv/rag-application:api-1.0.0
    container_name: spring-rag-api

    ports:
      - "3000:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/rag_application_db
      AI_BASE_URL: http://host.docker.internal:1234

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: